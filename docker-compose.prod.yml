# Éles környezet (VPS): csak backend + MongoDB fut itt,
# a frontend Vercelre kerül (lásd README).
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # Élesben NEM publikáljuk a Mongo portot a hostra.

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/garas
      PORT: 4000
      CORS_ORIGINS: ${CORS_ORIGINS:?A Vercel frontend URL-je, pl. https://garas-hkr.vercel.app}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?Kötelező élesben}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
    ports:
      - "4000:4000"

volumes:
  mongo-data:
